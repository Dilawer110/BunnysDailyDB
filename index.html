<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Dashboard — Rauf Sons</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface2: #f0f1f3;
    --border: #e2e4e9;
    --border-strong: #c9cdd6;
    --text-primary: #1a1d23;
    --text-secondary: #5a5f6e;
    --text-muted: #9097a8;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --radius: 10px;
    --radius-sm: 6px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Top bar ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 16px; height: 16px; fill: #fff; }
  .header-right {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-muted);
  }
  .badge {
    background: var(--accent-light); color: var(--accent);
    border: 1px solid #bfdbfe;
    border-radius: 20px; padding: 2px 10px;
    font-size: 11px; font-weight: 500;
  }

  /* ── Layout ── */
  .page { max-width: 1200px; margin: 0 auto; padding: 28px 24px 48px; }

  .page-title {
    font-size: 22px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .page-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    box-shadow: var(--shadow-sm);
  }
  .ctrl-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-right: 2px; }
  .seg-group { display: flex; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); overflow: hidden; }
  .seg-btn {
    padding: 6px 14px; font-size: 12px; font-weight: 500;
    background: var(--surface); color: var(--text-secondary);
    border: none; cursor: pointer; font-family: var(--font);
    transition: background 0.15s, color 0.15s;
    border-right: 1px solid var(--border-strong);
  }
  .seg-btn:last-child { border-right: none; }
  .seg-btn.active { background: var(--accent); color: #fff; }
  .seg-btn:hover:not(.active) { background: var(--surface2); }
  .divider { width: 1px; height: 24px; background: var(--border); }

  /* ── KPI Grid ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--kpi-accent, var(--accent));
  }
  .kpi-card:hover { box-shadow: var(--shadow-md); }
  .kpi-icon {
    width: 32px; height: 32px;
    background: var(--kpi-accent-bg, var(--accent-light));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
  }
  .kpi-icon svg { width: 16px; height: 16px; }
  .kpi-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 600; color: var(--text-primary); line-height: 1; font-variant-numeric: tabular-nums; }
  .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* ── Section card ── */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    margin-bottom: 24px;
  }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 10px;
  }
  .section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .section-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .section-body { padding: 20px; overflow-x: auto; }

  /* ── Heatmap table ── */
  .hm-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 3px;
    font-family: var(--mono);
  }
  .hm-table th {
    font-family: var(--font);
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 6px 10px;
    text-align: center;
    white-space: nowrap;
  }
  .hm-table th.row-header { text-align: left; }
  .hm-table td.ob-cell {
    font-family: var(--font);
    font-size: 12px; font-weight: 500;
    color: var(--text-primary);
    padding: 4px 10px 4px 4px;
    white-space: nowrap;
  }
  .hm-cell {
    padding: 0;
    text-align: center;
    vertical-align: middle;
  }
  .cell-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 72px;
    height: 36px;
    border-radius: 5px;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
    transition: transform 0.1s;
    cursor: default;
    width: 100%;
  }
  .cell-box:hover { transform: scale(1.06); z-index: 2; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .cell-empty {
    display: inline-flex;
    align-items: center; justify-content: center;
    min-width: 72px; height: 36px;
    border-radius: 5px;
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 11px;
    width: 100%;
  }
  .hm-table td.total-cell { font-family: var(--mono); }
  .total-box {
    display: inline-flex;
    align-items: center; justify-content: center;
    min-width: 72px; height: 36px;
    border-radius: 5px;
    font-size: 11.5px; font-weight: 600;
    background: var(--surface2);
    color: var(--text-primary);
    border: 1px solid var(--border);
    width: 100%;
  }

  /* ── Legend ── */
  .legend {
    display: flex; align-items: center; gap: 10px;
    margin-top: 14px;
    font-size: 11px; color: var(--text-muted);
  }
  .legend-bar {
    width: 160px; height: 10px;
    border-radius: 5px;
    background: linear-gradient(to right, #f8696b, #ffeb84, #63be7b);
  }

  /* ── Loading / Error state ── */
  .state-box {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; color: var(--text-muted); font-size: 13px; gap: 10px;
  }
  .state-box svg { width: 36px; height: 36px; opacity: 0.35; }

  /* ── Fade in ── */
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  .animate { animation: fadeUp 0.35s ease both; }
  .delay-1 { animation-delay: 0.06s; }
  .delay-2 { animation-delay: 0.12s; }
  .delay-3 { animation-delay: 0.18s; }
  .delay-4 { animation-delay: 0.24s; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
    </div>
    Sales Dashboard
  </div>
  <div class="header-right">
    <span>Rauf Sons</span>
    <span class="badge" id="dateRangeBadge">Loading…</span>
  </div>
</header>

<div class="page">
  <div class="page-title">Performance Overview</div>
  <div class="page-sub" id="pageSubtitle">Loading data…</div>

  <!-- Controls -->
  <div class="controls animate">
    <span class="ctrl-label">Metric:</span>
    <div class="seg-group">
      <button class="seg-btn active" id="btnCtns" onclick="setMetric('ctns')">Sales CTN</button>
      <button class="seg-btn" id="btnInv" onclick="setMetric('invoices')">Invoice Count</button>
    </div>
    <div class="divider"></div>
    <span class="ctrl-label">Channel:</span>
    <div class="seg-group" id="channelGroup"></div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card animate"><div class="state-box" style="padding:20px 0;">Loading…</div></div>
  </div>

  <!-- Heatmap -->
  <div class="section-card animate delay-4">
    <div class="section-head">
      <div>
        <div class="section-title">Order Booker × Date Heatmap</div>
        <div class="section-sub" id="hmSubtitle">Loading…</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="legend">
          <span>Low</span>
          <div class="legend-bar"></div>
          <span>High</span>
        </div>
      </div>
    </div>
    <div class="section-body">
      <div id="hmContainer"><div class="state-box"><span>Loading data…</span></div></div>
    </div>
  </div>
</div>

<script>
// ─── helpers ───────────────────────────────────────────────
function groupBy(arr, key) {
  return arr.reduce((m, v) => { (m[v[key]] = m[v[key]] || []).push(v); return m; }, {});
}
function unique(arr) { return [...new Set(arr)]; }
function sum(arr) { return arr.reduce((a, b) => a + b, 0); }
function avg(arr) { return arr.length ? sum(arr) / arr.length : 0; }
function fmt(n, decimals) {
  if (n === null || n === undefined) return '—';
  return Number(n).toFixed(decimals !== undefined ? decimals : 2);
}

// Excel-style RdYlGn colour scale
function rdYlGn(t) {
  // t: 0 (low=red) → 0.5 (mid=yellow) → 1 (high=green)
  // Matches Excel's 3-colour scale: #F8696B → #FFEB84 → #63BE7B
  t = Math.max(0, Math.min(1, t));
  let r, g, b;
  if (t < 0.5) {
    const s = t / 0.5;
    r = Math.round(248 + (255 - 248) * s);
    g = Math.round(105 + (235 - 105) * s);
    b = Math.round(107 + (132 - 107) * s);
  } else {
    const s = (t - 0.5) / 0.5;
    r = Math.round(255 + (99 - 255) * s);
    g = Math.round(235 + (190 - 235) * s);
    b = Math.round(132 + (123 - 132) * s);
  }
  return `rgb(${r},${g},${b})`;
}

// Auto dark/light text on coloured bg (relative luminance)
function textColor(bgRgb) {
  const m = bgRgb.match(/\d+/g).map(Number);
  const [r, g, b] = m.map(c => { c /= 255; return c <= 0.03928 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4; });
  const L = 0.2126 * r + 0.7152 * g + 0.0722 * b;
  return L > 0.35 ? '#1a1d23' : '#ffffff';
}

// ─── state ─────────────────────────────────────────────────
let allData = [];
let currentMetric = 'ctns';
let currentChannel = 'All';

// ─── load data ─────────────────────────────────────────────
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    allData = data;
    initChannels();
    render();
  })
  .catch(() => {
    document.getElementById('hmContainer').innerHTML =
      '<div class="state-box"><span>Could not load data.json. Make sure it is in the same folder.</span></div>';
  });

function initChannels() {
  const channels = ['All', ...unique(allData.map(d => d['Channel']))];
  const grp = document.getElementById('channelGroup');
  grp.innerHTML = channels.map(c =>
    `<button class="seg-btn ${c === 'All' ? 'active' : ''}" onclick="setChannel('${c}')">${c}</button>`
  ).join('');
}

function setMetric(m) {
  currentMetric = m;
  document.getElementById('btnCtns').classList.toggle('active', m === 'ctns');
  document.getElementById('btnInv').classList.toggle('active', m === 'invoices');
  render();
}

function setChannel(c) {
  currentChannel = c;
  document.querySelectorAll('#channelGroup .seg-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === c);
  });
  render();
}

// ─── main render ───────────────────────────────────────────
function render() {
  const data = currentChannel === 'All' ? allData : allData.filter(d => d['Channel'] === currentChannel);

  const dates = unique(data.map(d => d['Date'])).sort();
  const obs   = unique(data.map(d => d['Order Booker Code'])).sort();

  // Date range badge
  if (dates.length) {
    const fmt2 = d => { const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; };
    document.getElementById('dateRangeBadge').textContent =
      dates.length === 1 ? fmt2(dates[0]) : `${fmt2(dates[0])} – ${fmt2(dates[dates.length-1])}`;
  }
  document.getElementById('pageSubtitle').textContent =
    `${data.length} records · ${obs.length} order booker${obs.length !== 1 ? 's' : ''} · ${dates.length} day${dates.length !== 1 ? 's' : ''}`;

  renderKPIs(data, dates, obs);
  renderHeatmap(data, dates, obs);
}

// ─── KPIs ──────────────────────────────────────────────────
function renderKPIs(data, dates, obs) {
  const byDate = groupBy(data, 'Date');

  const dailyCtns  = dates.map(d => sum(byDate[d].map(r => r['Sales CTN'])));
  const dailyInvs  = dates.map(d => unique(byDate[d].map(r => r['Invoice Number'])).length);
  const dailyObs   = dates.map(d => unique(byDate[d].map(r => r['Order Booker Code'])).length);
  const dailySku   = dates.map(d => {
    const byOutlet = groupBy(byDate[d], 'Outlet Code');
    const counts   = Object.values(byOutlet).map(rows => unique(rows.map(r => r['SKU Code'])).length);
    return avg(counts);
  });

  const kpis = [
    {
      label: 'Avg Daily Volume',
      value: avg(dailyCtns).toFixed(2) + ' CTN',
      sub: 'Sales cartons per day',
      accent: '#2563eb', bg: '#eff4ff',
      icon: `<svg viewBox="0 0 16 16" fill="#2563eb"><path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z" opacity=".2"/><path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z" fill="none" stroke="#2563eb" stroke-width="1.4"/></svg>`
    },
    {
      label: 'Avg Invoice Count',
      value: avg(dailyInvs).toFixed(1),
      sub: 'Unique invoices per day',
      accent: '#7c3aed', bg: '#f5f3ff',
      icon: `<svg viewBox="0 0 16 16" fill="none" stroke="#7c3aed" stroke-width="1.4"><rect x="2" y="1" width="10" height="13" rx="1.5"/><line x1="4.5" y1="5" x2="9.5" y2="5"/><line x1="4.5" y1="7.5" x2="9.5" y2="7.5"/><line x1="4.5" y1="10" x2="7" y2="10"/></svg>`
    },
    {
      label: 'Avg OB Operated',
      value: avg(dailyObs).toFixed(1),
      sub: 'Order bookers active / day',
      accent: '#059669', bg: '#ecfdf5',
      icon: `<svg viewBox="0 0 16 16" fill="none" stroke="#059669" stroke-width="1.4"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-3 2.5-5 5-5"/><circle cx="12" cy="6" r="2"/><path d="M10 13c0-2 1.5-3.5 3-3.5"/></svg>`
    },
    {
      label: 'Avg SKU / Shop',
      value: avg(dailySku).toFixed(1),
      sub: 'Unique SKUs per outlet',
      accent: '#d97706', bg: '#fffbeb',
      icon: `<svg viewBox="0 0 16 16" fill="none" stroke="#d97706" stroke-width="1.4"><rect x="2" y="8" width="3" height="6" rx="1"/><rect x="6.5" y="5" width="3" height="9" rx="1"/><rect x="11" y="2" width="3" height="12" rx="1"/></svg>`
    }
  ];

  document.getElementById('kpiGrid').innerHTML = kpis.map((k, i) => `
    <div class="kpi-card animate delay-${i + 1}" style="--kpi-accent:${k.accent};--kpi-accent-bg:${k.bg};">
      <div class="kpi-icon">${k.icon}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>
  `).join('');
}

// ─── Heatmap ───────────────────────────────────────────────
function renderHeatmap(data, dates, obs) {
  const metricLabel = currentMetric === 'ctns' ? 'Sales CTN' : 'Invoice Count';
  document.getElementById('hmSubtitle').textContent =
    `${metricLabel} · ${obs.length} order booker${obs.length !== 1 ? 's' : ''} × ${dates.length} date${dates.length !== 1 ? 's' : ''}`;

  // Build value matrix: obs × dates
  const matrix = obs.map(ob => dates.map(date => {
    const rows = data.filter(r => r['Order Booker Code'] === ob && r['Date'] === date);
    if (!rows.length) return null;
    if (currentMetric === 'ctns') return sum(rows.map(r => r['Sales CTN']));
    return unique(rows.map(r => r['Invoice Number'])).length;
  }));

  // Row totals
  const rowTotals = matrix.map(row => sum(row.filter(v => v !== null)));

  // Global min / max for colour scale
  const flat = matrix.flat().filter(v => v !== null);
  const minV = flat.length ? Math.min(...flat) : 0;
  const maxV = flat.length ? Math.max(...flat) : 1;

  const dateFmt = d => {
    const [y, m, day] = d.split('-');
    return `${day}/${m}`;
  };

  let html = `<table class="hm-table">
    <thead>
      <tr>
        <th class="row-header">OB Code</th>
        ${dates.map(d => `<th>${dateFmt(d)}</th>`).join('')}
        <th>Total</th>
      </tr>
    </thead>
    <tbody>`;

  obs.forEach((ob, oi) => {
    html += `<tr><td class="ob-cell">${ob}</td>`;
    dates.forEach((_, di) => {
      const v = matrix[oi][di];
      if (v === null) {
        html += `<td class="hm-cell"><span class="cell-empty">—</span></td>`;
      } else {
        const t = maxV === minV ? 0.5 : (v - minV) / (maxV - minV);
        const bg = rdYlGn(t);
        const tc = textColor(bg);
        const display = currentMetric === 'ctns' ? fmt(v, 2) : v;
        html += `<td class="hm-cell"><span class="cell-box" style="background:${bg};color:${tc}" title="${ob} · ${dates[di]} · ${display}">${display}</span></td>`;
      }
    });
    // Row total
    const rt = rowTotals[oi];
    const display = currentMetric === 'ctns' ? fmt(rt, 2) : rt;
    html += `<td class="total-cell"><span class="total-box">${display}</span></td>`;
    html += `</tr>`;
  });

  // Column totals footer
  html += `<tr><td class="ob-cell" style="color:var(--text-muted);font-weight:600;">Total</td>`;
  dates.forEach((_, di) => {
    const colVals = matrix.map(row => row[di]).filter(v => v !== null);
    const colSum  = sum(colVals);
    const display = currentMetric === 'ctns' ? fmt(colSum, 2) : colSum;
    html += `<td class="total-cell"><span class="total-box" style="font-weight:600;">${display}</span></td>`;
  });
  const grandTotal = sum(rowTotals);
  html += `<td class="total-cell"><span class="total-box" style="font-weight:700;border:1.5px solid var(--border-strong);">${currentMetric === 'ctns' ? fmt(grandTotal, 2) : grandTotal}</span></td>`;
  html += `</tr></tbody></table>`;

  document.getElementById('hmContainer').innerHTML = html;
}
</script>
</body>
</html>
